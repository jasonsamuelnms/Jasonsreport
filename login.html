<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NMS Schools Group</title>
  <!-- Tailwind CSS CDN for quick deployment -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">

  <!-- Navigation Bar Example (Preserved structure) -->
  <header class="w-full py-4 px-8 border-b border-slate-200/80 bg-white/50 backdrop-blur-md">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <span class="font-bold text-lg text-slate-700">NMS Schools</span>
      <nav class="space-x-4">
        <a href="#about" class="text-sm text-slate-600 hover:text-slate-900">About</a>
        <a href="#contact" class="text-sm text-slate-600 hover:text-slate-900">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="min-h-[85vh] bg-slate-50 flex flex-col justify-center items-center px-4 py-12 relative overflow-hidden">
    
    <!-- Abstract Subtle Background Elements -->
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-gradient-to-tr from-blue-100/40 to-slate-200/40 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-72 h-72 bg-slate-100 rounded-full blur-2xl pointer-events-none"></div>

    <!-- Central Content Container -->
    <div class="relative z-10 max-w-4xl mx-auto text-center flex flex-col items-center">
      
      <!-- Centered Logo with Generous Padding -->
      <div class="p-8 md:p-12 mb-6 inline-block rounded-2xl bg-white/60 backdrop-blur-sm shadow-sm border border-slate-100">
        <img 
          src="NMS SCHOOLS group.png" 
          alt="NMS Schools Group Logo" 
          class="h-28 md:h-36 lg:h-44 w-auto object-contain mx-auto transition-transform duration-300 hover:scale-105"
        />
      </div>

      <!-- Responsive Button Group (Side-by-side on Desktop, Stacked on Mobile) -->
      <div class="w-full max-w-md sm:max-w-none flex flex-col sm:flex-row items-center justify-center gap-4 mt-6">
        <a href="#primary-action" class="w-full sm:w-auto px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl shadow-md hover:shadow-lg transition-all duration-200 text-center">
          Get Started
        </a>
        <a href="#secondary-action" class="w-full sm:w-auto px-8 py-3.5 bg-white hover:bg-slate-50 text-slate-700 font-medium rounded-xl border border-slate-200 shadow-sm transition-all duration-200 text-center">
          Learn More
        </a>
      </div>

    </div>
  </section>

  <!-- Additional Page Content (Preserved layout) -->
  <footer class="py-6 border-t border-slate-200 text-center text-sm text-slate-500">
    <p>&copy; NMS Schools Group. All rights reserved.</p>
  </footer>

</body>
</html>
